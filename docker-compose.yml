services:
  postgres:
    image: postgres:18-alpine
    container_name: cibercheck-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cibercheck
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d cibercheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cibercheck-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cibercheck
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: http://localhost:${WEB_PORT:-3000}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
      MANAGEMENT_API_KEY: ${MANAGEMENT_API_KEY}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:8080/store/config || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
